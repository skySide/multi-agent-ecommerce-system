spring:
  application:
    name: multi-agent-ecommerce
  ai:
    openai:
      # 硅基流动配置（兼容 OpenAI API 格式）
      # 【重要】base-url 不要带 /v1！Spring AI 内部已硬编码 /v1/embeddings 路径
      # 如果带 /v1，实际请求会变成 https://.../v1/v1/embeddings → 404
      api-key: ${SILICONFLOW_API_KEY:}
      base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
      chat:
        options:
          model: ${SILICONFLOW_CHAT_MODEL:deepseek-ai/DeepSeek-V3}
          temperature: 0.7
          # 调大输出窗口：DeepSeek-V3支持64K上下文，max-tokens设为8192
          # 默认值(256-512)在tool calling+结构化输出场景下易导致JSON被截断
          max-tokens: 8192
      embedding:
        options:
          model: ${SILICONFLOW_EMBEDDING_MODEL:BAAI/bge-large-zh-v1.5}
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8
    username: root
    password: lf_MySQL
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 192.168.252.130
      port: 6379
      password: 123321
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1

# MyBatis-Plus 配置
